name: A2UIAppKitDemo
options:
  bundleIdPrefix: com.demo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  A2UI:
    path: ../../..
targets:
  A2UIAppKitDemo:
    type: application
    platform: macOS
    sources:
      - path: A2UIAppKitDemo
    dependencies:
      - package: A2UI
        product: A2UIAppKit
      - package: A2UI
        product: A2UISwiftCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.demo.A2UIAppKitDemo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
